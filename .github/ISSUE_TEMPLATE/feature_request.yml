name: Feature Request
description: Suggest an idea for agentops
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "Have an idea? We'd love to hear it!"

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      placeholder: I'm frustrated when...

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: willing-to-pr
    attributes:
      label: Would you like to implement this?
      options:
        - "Yes, I'd like to open a PR"
        - "No, just suggesting"
