name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: agentops version / commit
      placeholder: "e.g. main@abc1234"
    validations:
      required: false

  - type: dropdown
    id: install-method
    attributes:
      label: How did you install agentops?
      options:
        - Docker (docker compose up)
        - Manual (pip install)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `python scripts/update_status.py ...`
        2. Open dashboard
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      render: shell
