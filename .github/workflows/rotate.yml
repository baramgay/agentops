name: Monthly Work Log Rotate & Report

on:
  schedule:
    - cron: '0 0 1 * *'  # UTC 00:00 on 1st = KST 09:00 on 1st
  workflow_dispatch:
    inputs:
      month:
        description: '대상 월 (YYYY-MM, 비워두면 전월 자동)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  rotate-and-report:
    name: 월간 로테이션 및 보고서 생성
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: work_log 로테이션
        run: python scripts/rotate_worklog.py

      - name: 월간 보고서 생성
        run: |
          if [ -n "${{ github.event.inputs.month }}" ]; then
            python scripts/monthly_report.py --month "${{ github.event.inputs.month }}"
          else
            python scripts/monthly_report.py
          fi

      - name: Git 설정 및 커밋
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add work_log.jsonl archive/ reports/
          git diff --cached --quiet || git commit -m "ci: monthly rotate & report $(date +%Y-%m) [skip ci]"
          git pull --rebase origin master
          git push origin master
