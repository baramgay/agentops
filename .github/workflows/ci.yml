name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core dependencies
        run: |
          pip install --upgrade pip
          pip install fastapi "uvicorn[standard]" pydantic python-dotenv argcomplete

      - name: Smoke test — import scripts
        env:
          AGENTS_HOME: ${{ github.workspace }}
        run: |
          python -c "import sys; sys.path.insert(0,'scripts'); import common_io; print('common_io OK')" || true
          python scripts/validate_config.py --quiet || true

      - name: Validate agent status JSON
        run: |
          python -c "import json; data=json.load(open('agent_status.json')); print(f'agents: {len(data)}')"

      - name: Validate issues JSON
        run: |
          python -c "import json; json.load(open('issues.json')); print('issues.json OK')"
