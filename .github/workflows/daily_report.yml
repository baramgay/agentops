name: Daily Report

on:
  schedule:
    - cron: '0 0 * * *'  # UTC 00:00 = KST 09:00
  workflow_dispatch:
    inputs:
      date:
        description: '보고서 날짜 (YYYY-MM-DD, 비워두면 오늘)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  report:
    name: 일간 업무 보고서 생성
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 보고서 생성
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python scripts/daily_report.py --date "${{ github.event.inputs.date }}"
          else
            python scripts/daily_report.py
          fi

      - name: 보고서 인덱스 갱신
        run: python scripts/generate_reports_index.py

      - name: Git 설정 및 커밋
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add reports/
          git diff --cached --quiet || git commit -m "ci: daily report $(date +%Y-%m-%d) [skip ci]"
          git pull --rebase origin master
          git push origin master
